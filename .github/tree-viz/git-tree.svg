<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1200" height="1020" 
     viewBox="0 0 1200 1020">
  <defs>
    <radialGradient id="leafGradient">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="mergeGradient">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="forkGradient">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="tagGradient">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.8" />
    </radialGradient>
    <style>
      .branch-line { stroke: #64748b; stroke-width: 2; fill: none; opacity: 0.7; }
      .trunk-line { stroke: #22c55e; stroke-width: 2.5; fill: none; opacity: 0.6; }
      .commit-leaf { cursor: pointer; }
      .commit-leaf:hover { filter: brightness(1.5); }
      .branch-label { font-family: sans-serif; font-size: 12px; font-weight: bold; fill: #0f172a; }
    </style>
  </defs>
  
  <rect width="1200" height="1020" fill="#f8fafc"/>
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="1020" fill="url(#grid)"/>
  
  <!-- Branch connection lines -->
  <g id="branches">
    <line class="trunk-line" x1="600" y1="60" x2="600" y2="100"/>
    <line class="trunk-line" x1="600" y1="100" x2="600" y2="140"/>
    <line class="trunk-line" x1="600" y1="140" x2="600" y2="180"/>
    <line class="trunk-line" x1="600" y1="180" x2="600" y2="220"/>
    <line class="trunk-line" x1="600" y1="220" x2="600" y2="340"/>
    <path class="branch-line" d="M 600 220 C 600 236, 720 244, 720 260"/>
    <path class="branch-line" d="M 720 260 C 720 292, 600 308, 600 340"/>
    <line class="trunk-line" x1="600" y1="340" x2="600" y2="460"/>
    <path class="branch-line" d="M 480 380 C 480 412, 600 428, 600 460"/>
    <line class="trunk-line" x1="600" y1="460" x2="600" y2="500"/>
    <line class="trunk-line" x1="600" y1="500" x2="600" y2="540"/>
    <line class="trunk-line" x1="600" y1="540" x2="600" y2="580"/>
    <line class="trunk-line" x1="600" y1="580" x2="600" y2="620"/>
    <line class="trunk-line" x1="600" y1="620" x2="600" y2="660"/>
    <line class="trunk-line" x1="600" y1="660" x2="600" y2="700"/>
    <line class="trunk-line" x1="600" y1="700" x2="600" y2="740"/>
    <line class="trunk-line" x1="600" y1="740" x2="600" y2="780"/>
    <line class="trunk-line" x1="600" y1="780" x2="600" y2="820"/>
    <line class="trunk-line" x1="600" y1="820" x2="600" y2="860"/>
    <line class="trunk-line" x1="600" y1="860" x2="600" y2="900"/>
  </g>
  <!-- Commit nodes -->
  <g id="commits">
    <circle class="commit-leaf" cx="600" cy="60" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>20b3c6f: chore(dc-init): load workflows,actions</title></circle>
    <circle class="commit-leaf" cx="600" cy="100" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>2133034: chore: update git tree visualisation</title></circle>
    <circle class="commit-leaf" cx="600" cy="140" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>995faf3: chore(dc-init): update workflows,actions</title></circle>
    <circle class="commit-leaf" cx="600" cy="180" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>8663a88: chore(dc-init): update workflows and actions</title></circle>
    <circle class="commit-leaf" cx="600" cy="220" r="10" fill="url(#mergeGradient)" stroke="#7c3aed" stroke-width="1.5"><title>d8b8368: Merge pull request #2 from XAOSTECH:anglicise/20260301-020200\n\nchore: Convert American spellings to British English</title></circle>
    <circle class="commit-leaf" cx="720" cy="260" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>55810b3: chore: convert American spellings to British English</title></circle>
    <circle class="commit-leaf" cx="600" cy="340" r="9" fill="url(#forkGradient)" stroke="#ea580c" stroke-width="1.5"><title>30ebb8f: dc-init</title></circle>
    <circle class="commit-leaf" cx="480" cy="380" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>6eec922: chore: convert American spellings to British English</title></circle>
    <circle class="commit-leaf" cx="600" cy="460" r="9" fill="url(#forkGradient)" stroke="#ea580c" stroke-width="1.5"><title>60a8fb0: chore:refactor container</title></circle>
    <circle class="commit-leaf" cx="600" cy="500" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>5771e20: fix(devcontainer): recreate examples + add minimal configs</title></circle>
    <circle class="commit-leaf" cx="600" cy="540" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>db63b5d: fix(devcontainer): fix perm &amp;&amp; pip installation</title></circle>
    <circle class="commit-leaf" cx="600" cy="580" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>180cdc8: chore(devcontainer cleanup)</title></circle>
    <circle class="commit-leaf" cx="600" cy="620" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>cccf6a0: feat: add dynamic nvm, YOLOv8n ONNX, and example configs</title></circle>
    <circle class="commit-leaf" cx="600" cy="660" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>cf13e27: feat: add yt-dlp, sqlite3, cookie handling for video downloads</title></circle>
    <circle class="commit-leaf" cx="600" cy="700" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>acd8047: feat: Add YOLO-based gaming highlight detection</title></circle>
    <circle class="commit-leaf" cx="600" cy="740" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>137be8b: chore(cleanup)</title></circle>
    <circle class="commit-leaf" cx="600" cy="780" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>3b971b7: feat(v0.3): YouTube fetch + processed tracking + ResNet50 model</title></circle>
    <circle class="commit-leaf" cx="600" cy="820" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>3467eae: feat(chromium): container-optimized config with privacy hardening</title></circle>
    <circle class="commit-leaf" cx="600" cy="860" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>f5cced5: fix(chromium): detect symlink locks and improve container detection</title></circle>
    <circle class="commit-leaf" cx="600" cy="900" r="6" fill="url(#leafGradient)" stroke="#16a34a" stroke-width="1.5"><title>60fd3d3: feat(v0.2): complete VIDCOM pipeline implementation</title></circle>
  </g>
  
  <!-- Legend -->
  <g id="legend" transform="translate(20, 20)">
    <rect width="200" height="110" fill="white" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <circle cx="20" cy="25" r="5" fill="url(#leafGradient)" stroke="#16a34a"/>
    <text x="32" y="30" class="branch-label" font-size="12">Regular Commit</text>
    <circle cx="20" cy="50" r="6" fill="url(#mergeGradient)" stroke="#7c3aed"/>
    <text x="32" y="55" class="branch-label" font-size="12">Merge Commit</text>
    <circle cx="20" cy="75" r="6" fill="url(#forkGradient)" stroke="#ea580c"/>
    <text x="32" y="80" class="branch-label" font-size="12">Fork Point</text>
    <circle cx="20" cy="100" r="6" fill="url(#tagGradient)" stroke="#0284c7"/>
    <text x="32" y="105" class="branch-label" font-size="12">Tagged</text>
  </g>
  
  <!-- Repository info -->
  <g id="info" transform="translate(20, 980)">
    <text x="0" y="0" class="branch-label" font-size="12" fill="#666">
      Repository: vidcom
    </text>
    <text x="0" y="20" class="branch-label" font-size="10" fill="#999">
      Generated: 2026-03-30 02:52:40 UTC
    </text>
  </g>
</svg>
